<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Glow effect behind icon -->
  <ellipse cx="100" cy="100" rx="70" ry="70" fill="#a855f7" opacity="0.3"/>

  <!-- Gentleman emoji/icon - stylized face with top hat -->
  <g transform="translate(45, 35)">
    <!-- Hat -->
    <rect x="15" y="0" width="70" height="45" rx="5" fill="#2d1b4e"/>
    <rect x="10" y="40" width="80" height="10" rx="3" fill="#1a0a2e"/>
    <rect x="15" y="5" width="70" height="5" fill="#7c3aed" opacity="0.5"/>

    <!-- Face -->
    <circle cx="50" cy="85" r="35" fill="#fcd5b8"/>

    <!-- Beard/Moustache -->
    <path d="M25 95 Q35 85 50 88 Q65 85 75 95 Q65 100 50 98 Q35 100 25 95" fill="#2d1b4e"/>

    <!-- Eyes -->
    <circle cx="38" cy="75" r="4" fill="#2d1b4e"/>
    <circle cx="62" cy="75" r="4" fill="#2d1b4e"/>
  </g>

  <!-- App Name -->
  <text x="180" y="75" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#a855f7">
    engram
  </text>
  <text x="180" y="120" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">
    Desktop
  </text>
  <text x="180" y="155" font-family="Arial, sans-serif" font-size="24" fill="#888888">
    View
  </text>

  <!-- Subtitle -->
  <text x="180" y="185" font-family="Arial, sans-serif" font-size="12" fill="#666666">
    Memory Dashboard for AI Agents
  </text>

  <!-- Decorative line -->
  <rect x="180" y="125" width="200" height="2" fill="url(#purple-glow)" opacity="0.5"/>

  <!-- Community badge -->
  <rect x="600" y="160" width="180" height="28" rx="14" fill="#7c3aed" opacity="0.2"/>
  <text x="690" y="180" font-family="Arial, sans-serif" font-size="11" fill="#a855f7" text-anchor="middle">
    Gentleman Programming
  </text>
</svg>